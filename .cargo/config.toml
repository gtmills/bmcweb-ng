# Cargo configuration for bmcweb-ng
#
# Cross-compilation targets used by the QEMU test workflow:
#
#   arm-unknown-linux-gnueabihf   — 32-bit ARMv7 hard-float
#                                   Used for BOTH qemuarm (Cortex-A15, virt machine)
#                                   AND p10bmc / IBM Rainier (AST2600, rainier-bmc machine).
#                                   The AST2600 is ARMv7-A, so the same cross-compiler
#                                   and target triple work for both.
#   aarch64-unknown-linux-gnu     — 64-bit ARM (future OpenBMC AST2700 targets)
#
# On Ubuntu/Debian install the cross-compilers with:
#   sudo apt-get install gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu
#
# To build for ARM (the profile has LTO=true which requires the env var override):
#   CC=arm-linux-gnueabihf-gcc \
#   CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc \
#   cargo build --release --target arm-unknown-linux-gnueabihf
#
# QEMU test scripts:
#   scripts/run_bmcweb_ng_qemu.sh  — generic qemuarm (virt machine)
#   scripts/run_rainier_qemu.sh    — IBM Rainier / p10bmc (rainier-bmc machine)

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"

# 32-bit ARMv7 hard-float — matches both OpenBMC qemuarm and IBM Rainier AST2600
[target.arm-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"

# 64-bit ARM — for future OpenBMC AST2700 / AArch64 BMC targets
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
