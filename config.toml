# bmcweb-ng configuration file

[server]
bind_address = "0.0.0.0"
port = 443
tls_cert = "/etc/bmcweb/cert.pem"
tls_key = "/etc/bmcweb/key.pem"
max_connections = 100

[auth]
methods = ["basic", "session", "mtls"]
session_timeout_seconds = 3600
max_sessions = 64

[features]
redfish = true
dbus_rest = true
kvm = true
virtual_media = true
event_service = true

[logging]
level = "info"
format = "json"

[metrics]
enabled = true
port = 9090